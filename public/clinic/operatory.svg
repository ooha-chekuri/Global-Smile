<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="flr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="800" height="310" fill="url(#bg)"/>
  <rect x="0" y="310" width="800" height="140" fill="url(#flr)"/>
  <line x1="0" y1="310" x2="800" y2="310" stroke="#a0aec0" stroke-width="2"/>
  
  <!-- Dental Chair - main piece -->
  <!-- Base -->
  <rect x="340" y="240" width="80" height="50" rx="5" fill="#64748b"/>
  <rect x="360" y="290" width="40" height="30" rx="4" fill="#475569"/>
  <!-- Seat -->
  <rect x="310" y="180" width="140" height="60" rx="12" fill="#1e293b"/>
  <!-- Backrest -->
  <rect x="440" y="120" width="30" height="120" rx="10" fill="#1e293b"/>
  <!-- Headrest -->
  <ellipse cx="455" cy="115" rx="20" ry="12" fill="#334155"/>
  <!-- Armrests -->
  <rect x="300" y="185" width="15" height="40" rx="5" fill="#475569"/>
  <rect x="445" y="185" width="15" height="40" rx="5" fill="#475569"/>
  
  <!-- Dental light - overhead -->
  <rect x="350" y="40" width="60" height="8" rx="4" fill="#94a3b8"/>
  <rect x="370" y="48" width="20" height="30" rx="2" fill="#94a3b8"/>
  <ellipse cx="380" cy="85" rx="40" ry="12" fill="#fef08a" opacity="0.8"/>
  <ellipse cx="380" cy="85" rx="25" ry="8" fill="#fef9c3" opacity="0.6"/>
  <!-- Light beam effect -->
  <polygon points="340,97 420,97 400,180 360,180" fill="#fef9c3" opacity="0.08"/>
  
  <!-- Tray with instruments -->
  <rect x="250" y="170" width="60" height="8" rx="4" fill="#94a3b8"/>
  <rect x="280" y="178" width="5" height="82" fill="#94a3b8"/>
  <rect x="250" y="165" width="60" height="5" rx="2" fill="#cbd5e1"/>
  <!-- Instruments on tray -->
  <line x1="260" y1="165" x2="260" y2="155" stroke="#94a3b8" stroke-width="2"/>
  <line x1="270" y1="165" x2="275" y2="155" stroke="#94a3b8" stroke-width="2"/>
  <line x1="285" y1="165" x2="282" y2="155" stroke="#94a3b8" stroke-width="2"/>
  <line x1="298" y1="165" x2="295" y2="155" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Dentist figure -->
  <circle cx="200" cy="140" r="18" fill="#0d9488"/>
  <rect x="185" y="158" width="30" height="50" rx="6" fill="#0d9488"/>
  <rect x="175" y="158" width="60" height="8" rx="4" fill="#0f766e"/>
  <!-- Face mask -->
  <ellipse cx="200" cy="142" rx="10" ry="6" fill="#e2e8f0"/>
  <!-- Headband lamp -->
  <rect x="190" y="120" width="20" height="6" rx="3" fill="#94a3b8"/>
  <circle cx="200" cy="120" r="4" fill="#fef08a"/>
  
  <!-- Monitor/Screen -->
  <rect x="140" y="100" width="70" height="50" rx="4" fill="#1e293b"/>
  <rect x="145" y="105" width="60" height="35" rx="2" fill="#38bdf8"/>
  <rect x="170" y="150" width="10" height="40" fill="#475569"/>
  <rect x="165" y="190" width="20" height="6" rx="3" fill="#334155"/>
  
  <!-- Counter/cabinet -->
  <rect x="550" y="200" width="200" height="80" rx="6" fill="#e2e8f0"/>
  <rect x="550" y="195" width="200" height="8" rx="4" fill="#cbd5e1"/>
  <rect x="560" y="210" width="40" height="60" rx="3" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="610" y="210" width="40" height="60" rx="3" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="700" y="210" width="40" height="60" rx="3" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  
  <!-- Sink -->
  <ellipse cx="620" cy="155" rx="18" ry="10" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1"/>
  <rect x="618" y="165" width="4" height="35" fill="#94a3b8"/>
  <!-- Faucet -->
  <rect x="615" y="130" width="10" height="20" rx="2" fill="#94a3b8"/>
  <rect x="610" y="130" width="20" height="6" rx="3" fill="#94a3b8"/>
  
  <!-- Label -->
  <text x="400" y="420" text-anchor="middle" fill="#6b7280" font-family="Arial" font-size="13">Treatment Operatory — Modern Dental Suite</text>
</svg>
